<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1001件人类艺术瑰宝</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <div class="header-title">
      <h1>1001<span>件人类艺术瑰宝</span></h1>
      <p class="subtitle">跨越五万年的人类创造力</p>
    </div>
    <div class="header-stats" id="stats">
      <span class="stat"><strong id="shown-count">1001</strong> 件作品</span>
      <span class="stat"><strong id="era-count">30</strong> 个时代</span>
      <span class="stat"><strong id="artist-count">0</strong> 位艺术家</span>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="搜索作品名称、艺术家、年代…" autocomplete="off">
    <button class="clear-btn" id="clear-search" title="清除">✕</button>
  </div>
  <div class="filter-row">
    <select id="era-filter"><option value="">全部时代</option></select>
    <select id="medium-filter"><option value="">全部媒材</option></select>
    <select id="country-filter"><option value="">全部地区</option></select>
    <button id="random-btn" class="btn-accent">随机作品</button>
    <button id="view-toggle" class="btn-outline" title="切换视图">⊞</button>
  </div>
</div>

<div class="timeline-nav" id="era-tabs"></div>

<main class="gallery" id="gallery"></main>

<div class="pagination" id="pagination"></div>

<div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-label="艺术品详情">
  <div class="modal-box">
    <button class="modal-close" id="modal-close" aria-label="关闭">✕</button>
    <div class="modal-content">
      <div class="modal-img-wrap">
        <img id="modal-img" alt="" loading="lazy">
        <div class="modal-img-placeholder" id="modal-placeholder"></div>
      </div>
      <div class="modal-info">
        <div class="modal-era-badge" id="modal-era"></div>
        <h2 id="modal-title"></h2>
        <p class="modal-artist" id="modal-artist"></p>
        <dl class="modal-meta">
          <dt>年代</dt><dd id="modal-year"></dd>
          <dt>媒材</dt><dd id="modal-medium"></dd>
          <dt>馆藏地</dt><dd id="modal-location"></dd>
          <dt>国家/地区</dt><dd id="modal-country"></dd>
        </dl>
        <p class="modal-desc" id="modal-desc"></p>
        <div class="modal-nav">
          <button id="prev-art">← 上一件</button>
          <span id="modal-num"></span>
          <button id="next-art">下一件 →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="no-results" id="no-results" style="display:none">
  <p>未找到符合条件的作品</p>
  <button onclick="resetFilters()">重置筛选</button>
</div>

<footer class="site-footer">
  <p>精选人类历史上1001件著名艺术作品 · 从史前壁画到当代艺术</p>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
